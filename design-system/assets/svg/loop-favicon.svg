      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!--
    ∞ 심볼 — fill 기반 lemniscate
