    좌측 루프 중심: (156, 256), 우측 루프 중심: (356, 256)
    루프 높이: 232px (140~372), 루프 폭: ~200px
    허리 pinch: 교차점 (256, 256)
  -->
  <path
    d="M 256 256
       C 280 210, 316 140, 356 140
       C 422 140, 472 192, 472 256
       C 472 320, 422 372, 356 372
       C 316 372, 280 302, 256 256
       C 232 210, 196 140, 156 140
       C 90 140, 40 192, 40 256
       C 40 320, 90 372, 156 372
       C 196 372, 232 302, 256 256
       Z"
