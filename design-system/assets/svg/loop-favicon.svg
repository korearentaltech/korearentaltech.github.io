<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!--
    Loop 로고 원본 L path
    원본 viewBox: 0 0 672 274
    L 바운딩박스: x=0~136.357, y=4.23~203.837 (약 136×200px)
    
    512 아이콘 중앙 배치:
    - 여백 80px 사방
    - 유효 영역: 352×352px
    - L 비율 136:200 = 0.68:1
    - 높이 기준: 352px → 스케일 = 352/200 = 1.76
    - 폭: 136 × 1.76 = 239px
    - 수평 중앙: (512-239)/2 = 136.5 → translate x: 136.5
    - 수직 중앙: (512-352)/2 = 80 → translate y: 80 - (4.23×1.76) = 80-7.4 = 72.6
    
    transform="translate(136.5 72.6) scale(1.76)"
  -->
  <g transform="translate(136 70) scale(1.76)">
    <path d="M16.4193 203.837C7.35987 203.837 0.0177612 196.495 0.0177612 187.435V20.645C0.0177612 11.5856 7.35987 4.23102 16.4193 4.23102H27.5818C36.6412 4.23102 43.9833 11.5856 43.9833 20.645V140.931C43.9833 150.003 51.3378 157.345 60.3972 157.345H119.943C129.015 157.345 136.357 164.687 136.357 173.759V187.435C136.357 196.495 129.015 203.837 119.943 203.837H16.4193Z" fill="white"/>
